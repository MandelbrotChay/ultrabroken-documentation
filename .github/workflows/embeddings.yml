name: Rebuild Embeddings & Deploy Worker

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'docs/assets/scripts/worker/**'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.docs_hash.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-minify-plugin beautifulsoup4 tqdm

      - name: Build MkDocs site
        run: mkdocs build

      - name: Check docs hash (skip if unchanged)
        id: docs_hash
        run: |
          # compute a hash of the docs files tracked in git
          CURRENT_HASH=${{ hashFiles('docs/**') }}
          echo "current=$CURRENT_HASH"
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          # try to download previously published hash from gh-pages
          PREV_HASH=$(curl -fsS "https://raw.githubusercontent.com/${OWNER}/${REPO}/gh-pages/wiki_index.hash" || true)
          echo "prev=$PREV_HASH"
          if [ -n "$PREV_HASH" ] && [ "$CURRENT_HASH" = "$PREV_HASH" ]; then
            echo "Docs unchanged - skipping embeddings"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build BM25 index
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          python docs/assets/scripts/worker/build_bm25_index.py --output site/wiki_index.json --gzip
          # write the docs hash next to the index so future runs can detect changes
          echo "${{ hashFiles('docs/**') }}" > site/wiki_index.hash

      - name: Gzip index and size-check
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi

      - name: Publish site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  ai-deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Fail early if Cloudflare secrets missing
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing Cloudflare secrets (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID)."
            echo "To enable AI worker deployment, add these secrets to the repo."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Publish Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "Publishing Cloudflare Worker using wrangler CLI"
          cd docs/assets/scripts/worker
          npx --yes wrangler@2 publish --account-id "${{ env.CLOUDFLARE_ACCOUNT_ID }}"

