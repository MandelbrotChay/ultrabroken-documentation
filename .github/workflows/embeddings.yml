name: Rebuild Embeddings & Deploy Worker

on:
  schedule:
    - cron: '0 2 * * *'   # daily at 02:00 UTC
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'docs/assets/scripts/worker/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip + HF model cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
            ~/.cache/huggingface/hub
            ~/.cache/torch
          key: ${{ runner.os }}-pip-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-hf-

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache wheelhouse
        uses: actions/cache@v4
        id: wheelhouse-cache
        with:
          path: ./.wheelhouse
          key: ${{ runner.os }}-wheelhouse-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-wheelhouse-

      - name: Build wheelhouse (if cache miss)
        if: steps.wheelhouse-cache.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip download -r requirements.txt -d ./.wheelhouse

      - name: Install from wheelhouse
        run: |
          python -m pip install --upgrade pip
          pip install --no-index --find-links ./.wheelhouse -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build

      - name: Check docs hash (skip if unchanged)
        id: docs_hash
        run: |
          # compute a hash of the docs files tracked in git
          CURRENT_HASH=${{ hashFiles('docs/**') }}
          echo "current=$CURRENT_HASH"
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          # try to download previously published hash from gh-pages
          PREV_HASH=$(curl -fsS "https://raw.githubusercontent.com/${OWNER}/${REPO}/gh-pages/wiki_index.hash" || true)
          echo "prev=$PREV_HASH"
          if [ -n "$PREV_HASH" ] && [ "$CURRENT_HASH" = "$PREV_HASH" ]; then
            echo "Docs unchanged - skipping embeddings"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build BM25 index
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          python docs/assets/scripts/worker/build_bm25_index.py --output site/wiki_index.json --gzip
          # write the docs hash next to the index so future runs can detect changes
          echo "${{ hashFiles('docs/**') }}" > site/wiki_index.hash

      - name: Gzip index and size-check
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi

      - name: Publish site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

      # Publish the Cloudflare Worker (optional) using existing repo secrets.
      # This step will only run when both CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are set.
      - name: Publish Cloudflare Worker
        if: env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "Publishing Cloudflare Worker using wrangler CLI"
          # Use npx to avoid relying on an external action tag; run from the worker dir so
          # wrangler picks up the wrangler.toml there.
          cd docs/assets/scripts/worker
          npx --yes @cloudflare/wrangler@2 publish --account-id "${{ env.CLOUDFLARE_ACCOUNT_ID }}"

