name: Docs — Build, BM25 Index & Publish

on:
  push:
    paths:
      - 'docs/**'
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.docs_hash.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache pip wheels
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('docs/assets/scripts/worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/assets/scripts/worker/requirements.txt mkdocs mkdocs-material mkdocs-minify-plugin

      - name: Build MkDocs site
        run: mkdocs build

      - name: Check docs hash (skip if unchanged)
        id: docs_hash
        run: |
          CURRENT_HASH=${{ hashFiles('docs/**') }}
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          PREV_HASH=$(curl -fsS "https://raw.githubusercontent.com/${OWNER}/${REPO}/gh-pages/wiki_index.hash" || true)
          if [ -n "$PREV_HASH" ] && [ "$CURRENT_HASH" = "$PREV_HASH" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build BM25 index
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          python docs/assets/scripts/worker/build_bm25_index.py --output site/wiki_index.json --gzip
          echo "${{ hashFiles('docs/**') }}" > site/wiki_index.hash

      - name: Gzip index and size-check
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi

      - name: Publish site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  ai-deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Fail early if Cloudflare secrets missing
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing Cloudflare secrets (CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID)."
            echo "To enable AI worker deployment, add these secrets to the repo."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Publish Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          echo "Publishing Cloudflare Worker using wrangler CLI"
          cd docs/assets/scripts/worker
          # Inject account_id into wrangler.toml so wrangler CLI doesn't require --account-id
          if grep -q "^account_id" wrangler.toml 2>/dev/null; then
            sed -i "s/^account_id *= *.*/account_id = \"${{ env.CLOUDFLARE_ACCOUNT_ID }}\"/" wrangler.toml
          else
            echo "account_id = \"${{ env.CLOUDFLARE_ACCOUNT_ID }}\"" >> wrangler.toml
          fi
          # Export token for Wrangler v4 compatibility
          export CF_API_TOKEN="${{ env.CLOUDFLARE_API_TOKEN }}"
          # Provision OpenRouter secrets from GitHub Secrets into the Worker (non-interactive)
          if [ -n "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "Provisioning OPENROUTER_API_KEY into Worker via wrangler secret put"
            printf "%s" "${{ secrets.OPENROUTER_API_KEY }}" | npx --yes wrangler@4 secret put OPENROUTER_API_KEY || true
          fi
          if [ -n "${{ secrets.OPENROUTER_MODEL }}" ]; then
            echo "Provisioning OPENROUTER_MODEL into Worker via wrangler secret put"
            printf "%s" "${{ secrets.OPENROUTER_MODEL }}" | npx --yes wrangler@4 secret put OPENROUTER_MODEL || true
          fi
          if [ -n "${{ secrets.SYSTEM_PROMPT }}" ]; then
            echo "Provisioning SYSTEM_PROMPT into Worker via wrangler secret put"
            printf "%s" "${{ secrets.SYSTEM_PROMPT }}" | npx --yes wrangler@4 secret put SYSTEM_PROMPT || true
          fi
          echo "Installing Wrangler v4 and deploying..."
          npx --yes wrangler@4 deploy

