name: Docs — Build, BM25 Index & Publish

on:
  push:
    paths:
      - 'docs/wiki/**'
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.docs_hash.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('docs/worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore wheelhouse
        uses: actions/cache@v4
        with:
          path: ./.wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('docs/worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Build wheels and install
        run: |
          python -m pip install --upgrade pip
          mkdir -p ./.wheels
          pip wheel --wheel-dir ./.wheels -r docs/worker/requirements.txt || true
          pip wheel --wheel-dir ./.wheels mkdocs mkdocs-material mkdocs-minify-plugin || true
          pip install --no-index --find-links ./.wheels -r docs/worker/requirements.txt
          pip install --no-index --find-links ./.wheels mkdocs mkdocs-material mkdocs-minify-plugin

      - name: Build MkDocs site
        run: mkdocs build

      - name: Check docs hash (skip if unchanged)
        id: docs_hash
        run: |
          CURRENT_HASH=${{ hashFiles('docs/wiki/**') }}
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          PREV_HASH=$(curl -fsS "https://raw.githubusercontent.com/${OWNER}/${REPO}/gh-pages/wiki_index.hash" || true)
          if [ -n "$PREV_HASH" ] && [ "$CURRENT_HASH" = "$PREV_HASH" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build BM25 index
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          python docs/worker/build_bm25_index.py --docs-dir docs/wiki --output site/wiki_index.json --gzip
          echo "${{ hashFiles('docs/wiki/**') }}" > site/wiki_index.hash

      - name: Gzip index and size-check
        if: ${{ steps.docs_hash.outputs.skip == 'false' }}
        run: |
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi

      - name: Publish site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site


