name: Site — publish (assets-only)

on:
  push:
    paths:
      - 'docs/assets/**'
  workflow_dispatch: {}

jobs:
  publish-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish assets to gh-pages
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}"
          rm -rf site || true
          # If gh-pages exists, clone it so we update only assets; otherwise create minimal site
          if git ls-remote --exit-code --heads origin gh-pages 2>/dev/null; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" site || true
          else
            mkdir -p site
            echo "<!doctype html><meta charset=\"utf-8\"><title>Placeholder</title><h1>Placeholder</h1>" > site/index.html
          fi
          mkdir -p site/assets
          cp -a docs/assets/. site/assets/

      - name: Publish site (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
