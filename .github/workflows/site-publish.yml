name: Site — publish (style / assets)

on:
  push:
    paths:
      - 'mkdocs.yml'
      - 'docs/assets/**'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('docs/worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Restore wheelhouse
        uses: actions/cache@v4
        with:
          path: ./.wheels
          key: ${{ runner.os }}-wheels-${{ hashFiles('docs/worker/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-wheels-

      - name: Build wheels and install
        run: |
          python -m pip install --upgrade pip
          mkdir -p ./.wheels
          pip wheel --wheel-dir ./.wheels -r docs/worker/requirements.txt || true
          pip wheel --wheel-dir ./.wheels mkdocs mkdocs-material mkdocs-minify-plugin || true
          pip install --no-index --find-links ./.wheels -r docs/worker/requirements.txt || true
          pip install --no-index --find-links ./.wheels mkdocs mkdocs-material mkdocs-minify-plugin
      - name: Build site
        run: mkdocs build
      - name: Publish site
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
