name: Deploy MkDocs

on:
  push:
    branches:
      - main

jobs:
  build-site:
    runs-on: ubuntu-latest
    outputs:
      site-upload-name: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-minify-plugin beautifulsoup4
      - name: Build MkDocs site
        run: mkdocs build
      - name: Generate title index
        run: |
          python docs/assets/scripts/worker/generate_search_index.py
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

  generate-embeddings:
    runs-on: ubuntu-latest
    needs: build-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/docs/assets/scripts/worker/**') }}
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./site
      - name: Install CPU PyTorch + sentence-transformers
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install sentence-transformers tqdm
      - name: Generate embeddings
        env:
          MODEL: all-MiniLM-L6-v2
        run: |
          python docs/assets/scripts/worker/generate_embeddings.py --output site/wiki_index.json --model "$MODEL"
      - name: Gzip index and size-check
        run: |
          if [ -f site/wiki_index.json ]; then gzip -9 -c site/wiki_index.json > site/wiki_index.json.gz; fi
          if [ -f site/wiki_index.json.gz ]; then
            s=$(wc -c < site/wiki_index.json.gz)
            echo "gz size $s"
            if [ "$s" -gt $((500*1024*1024)) ]; then
              echo "INDEX TOO LARGE $s"
              exit 1
            fi
          else
            echo 'no index produced'
            exit 1
          fi
      - name: Upload updated site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

  publish-site:
    runs-on: ubuntu-latest
    needs: generate-embeddings
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: ./site
      - name: Publish site to GH Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  publish-worker:
    runs-on: ubuntu-latest
    needs: publish-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Compute WIKI_INDEX_URL
        id: compute_url
        run: |
          OWNER=${{ github.repository_owner }}
          REPO=${{ github.event.repository.name }}
          # GH Pages URL for project sites
          URL="https://${OWNER}.github.io/${REPO}/wiki_index.json.gz"
          echo "WIKI_INDEX_URL=$URL" >> $GITHUB_OUTPUT

      - name: Put WIKI_INDEX_URL into Worker secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WIKI_INDEX_URL: ${{ steps.compute_url.outputs.WIKI_INDEX_URL }}
        run: |
          printf '%s' "$WIKI_INDEX_URL" | wrangler secret put WIKI_INDEX_URL --commit=false || true

      - name: Put SYSTEM_PROMPT into Worker secrets
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          SYSTEM_PROMPT: ${{ secrets.SYSTEM_PROMPT }}
        run: |
          printf '%s' "$SYSTEM_PROMPT" | wrangler secret put SYSTEM_PROMPT --commit=false || true

      - name: Publish Worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd docs/assets/scripts/worker
          wrangler publish --account-id "$CF_ACCOUNT_ID"
